name: Football Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'  # runs every week at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV

      - name: Run scraper
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python pipelines/football/ingestion/scraper.py

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Run dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          cd data_transformation
          dbt run
          dbt test