name: Football Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'  # runs every Monday at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV

      - name: Run scraper
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python pipelines/football/ingestion/scraper.py

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Create dbt profiles
        run: |
          mkdir -p /home/runner/.dbt
          cat <<EOF > /home/runner/.dbt/profiles.yml
          dbt_project:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: dbt_football
                location: US
                keyfile: /tmp/sa_key.json
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Run dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          cd data_transformation
          dbt run
          dbt test